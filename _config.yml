locale: "en-US"
site_theme: "default"

title: "Adam McMillan"
title_separator: "-"
name: &name "Adam McMillan"
description: &description "AI, machine learning, psychology, software engineering, and music."
url: "https://ajmcm.github.io"
baseurl: ""
repository: "ajmcm/ajmcm.github.io"

remote_theme: academicpages/academicpages.github.io

author:
  avatar: "adam2025.png"
  name: "Adam McMillan"
  bio: "Master of Information Technology student specialising in Artificial Intelligence."
  location: "Melbourne, Australia"
  email: "adam.j.mcmillan@gmail.com"
  github: "ajmcm"
  linkedin: "ajmcm"

breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

comments:
  provider: false

analytics:
  provider: false

include:
  - _pages
  - docs

exclude:
  - .bundle
  - .jekyll-cache
  - .sass-cache
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
timezone: Australia/Melbourne

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

defaults:
  - scope:
      path: "docs"
    values:
      sitemap: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
